name: Unattended Lead Checker

on:
  schedule:
    - cron: "30 3,15 * * *" # Every hour

  workflow_dispatch:

jobs:
  unattended-leads:
    runs-on: ubuntu-latest

    steps:
      - name: Call Unattended Leads API
        run: |
          curl --request GET \
          --url "${{ secrets.API_URL }}/api/cron/unattended-leads" \
          --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}"